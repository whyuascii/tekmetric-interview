apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "tekmetric-backend.fullname" . }}-test"
  labels:
    {{- include "tekmetric-backend.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['--spider', '--timeout=5', 'http://{{ include "tekmetric-backend.fullname" . }}:{{ .Values.service.port }}/api/welcome']
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
