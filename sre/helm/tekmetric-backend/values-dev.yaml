# Development environment — single replica, minimal resources, no scaling

environment:
  name: dev

replicaCount: 1

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

ingress:
  enabled: false

networkPolicy:
  enabled: false
